name: Implementar BCP para o Azure

on:
  push:
    branches:
      - master
        
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar dependências
      run: dotnet restore BCP/BCP.csproj
        
    - name: Build do projeto
      run: dotnet build BCP/BCP.csproj --configuration Release --no-restore
      
    - name: Publicar artefatos
      run: dotnet publish BCP/BCP.csproj --configuration Release --output ./publish --no-build
      
    - name: Implementar para Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: bcp-web
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish